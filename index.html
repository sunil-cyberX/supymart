      background:rgba(255,255,255,0.4);
      animation:dot 1.2s ease-in-out infinite;
    }

    .splash-dots span:nth-child(3){animation-delay:0.4s;}

              <button onClick={()=>setCart([])} className="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center"><X size={16}/></button>

              {cart.map(item=>(

                    <p className="text-sm font-black text-orange-600">{"Rs."+effP(item)}</p>

                  <div className="flex items-center gap-1">
                    <button className="w-7 h-7 rounded-full bg-white font-black flex items-center justify-center border" onClick={()=>setCart(prev=>prev.map(i=>i.id===item.id&&i.qty>1?{...i,qty:i.qty-1}:i).filter(i=>i.qty>0))}>-</button>

                    <button className="w-7 h-7 rounded-full bg-orange-600 text-white font-black flex items-center justify-center" onClick={()=>setCart(prev=>prev.map(i=>i.id===item.id?{...i,qty:i.qty+1}:i))}>+</button>
                  </div>
                  <button onClick={()=>setCart(prev=>prev.filter(i=>i.id!==item.id))}><Trash2 size={14} className="text-red-300"/></button>
                </div>
              ))}
              <div className="flex justify-between font-black text-base pt-2 border-t" style={{borderColor:"#f0ece8"}}><span>{"Estimated Total"}</span><span className="text-orange-600">{"Rs."+total}</span></div>
              <div className="rounded-2xl p-3" style={{background:"linear-gradient(135deg,#f0fdf4,#dcfce7)",border:"1.5px solid #86efac"}}>
                <p className="text-sm font-black text-green-800 mb-1">{tl(lang,"sw2ways")}</p>
                <p className="text-xs text-green-700 mt-0.5">{tl(lang,"swWa2")}</p>
                <p className="text-xs text-green-700 mt-1">{tl(lang,"swApp2")}</p>
              </div>
            </div>
            <div className="p-4 flex-shrink-0" style={{borderTop:"1px solid #f0ece8"}}>
              <button className="w-full py-4 rounded-2xl font-black text-white text-base flex items-center justify-center gap-2" style={{background:"linear-gradient(135deg,#16a34a,#15803d)",boxShadow:"0 4px 16px rgba(22,163,74,0.4)"}} onClick={waInquiry}>

      <div className="w-full flex items-center justify-center gap-2 py-2.5 px-4" style={{background:"linear-gradient(90deg,#1a0500,#3d0e04,#1a0500)",borderBottom:"1px solid rgba(255,100,30,0.3)"}}>
        <ShoppingBag size={13} style={{color:"#fb923c"}}/>
        <p className="text-xs font-black tracking-wide" style={{color:"rgba(251,146,60,0.9)"}}>{"Powered by "}<span style={{color:"#fb923c",fontSize:"13px"}}>{"SupyMart"}</span>{" Your Local Market Online"}</p>
        <ShoppingBag size={13} style={{color:"#fb923c"}}/>
      </div>

      <div style={{background:"linear-gradient(145deg,#6b1a06,#9a2d0a,#c2410c,#e55a18)",minHeight:"180px"}} className="relative">

          <button className="bg-white/20 border border-white/30 p-2.5 rounded-full text-white" onClick={shareNative}><Share2 size={16}/></button>

          <div className="w-20 h-20 rounded-2xl bg-white/20 border-2 border-white/30 flex items-center justify-center text-3xl mb-3 shadow-lg overflow-hidden">

          </div>
        </div>
      </div>

      <div className="px-4 mt-4">
        <div className="bg-white rounded-3xl p-4 mb-4 shadow-md">

            <button className="flex-1 flex flex-col items-center gap-1 py-3 bg-blue-50 rounded-2xl border border-blue-100" onClick={shareFb}><span className="text-xl">{"👤"}</span><span className="text-xs font-black text-blue-700">Facebook</span></button>
            <button className="flex-1 flex flex-col items-center gap-1 py-3 bg-pink-50 rounded-2xl border border-pink-100" onClick={()=>window.open("https://www.instagram.com/","_blank")}><span className="text-xl">{"📸"}</span><span className="text-xs font-black text-pink-700">Instagram</span></button>

                    {p.stock===0&&(<div className="absolute inset-0 bg-white/70 flex items-center justify-center"><span className="text-[10px] font-black text-red-500 bg-red-50 px-2 py-1 rounded-full">Out of Stock</span></div>)}

                  </div>
                  <div className="p-2.5">
                    <p className="text-xs font-black text-gray-800 truncate mb-0.5">{p.name}</p>
                    {p.offer&&(<p className="text-[9px] text-green-600 font-black truncate mb-0.5">{"🏷️ "+p.offer}</p>)}
                    <div className="flex items-center gap-1.5 mb-2">
                      <p className="text-sm font-black text-orange-600">{"Rs."+ep}</p>
                      {hasD&&(<p className="text-[10px] text-gray-400 line-through">{"Rs."+p.mrp}</p>)}
                    </div>
                    <button className="w-full py-1.5 rounded-xl text-[10px] font-black text-white flex items-center justify-center gap-1" style={{background:p.stock===0?"#d1d5db":ci?"linear-gradient(135deg,#065f46,#059669)":GR.primary}} onClick={e=>{e.stopPropagation();addCart(p);}} disabled={p.stock===0}>
                      {p.stock===0?"Unavailable":ci?"Added ("+ci.qty+") +":"+ Inquiry"}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      <div className="fixed bottom-0 left-1/2 w-full max-w-md z-40" style={{transform:"translateX(-50%)",background:"rgba(255,255,255,0.97)",borderTop:"1px solid #f0ece8",backdropFilter:"blur(12px)"}}>
        <div className="flex gap-2 px-4 pt-3 pb-1">
          <button className="flex-1 py-3 rounded-2xl font-black text-white flex items-center justify-center gap-2" style={{background:"linear-gradient(135deg,#16a34a,#15803d)",boxShadow:"0 4px 16px rgba(22,163,74,0.35)"}} onClick={()=>{const enPart="Hi! I want to know about "+shop.name+". (SupyMart website)";const localPart=lang==="en"?"":("\n\n"+wm.shopHi+" _"+wm.from+"_");window.open("https://wa.me/"+shop.phone+"?text="+encodeURIComponent(enPart+localPart),"_blank");}}>

          <button className="py-3 px-5 rounded-2xl font-black text-white flex items-center justify-center gap-1.5 relative" style={{background:GR.primary,boxShadow:"0 4px 16px rgba(234,88,12,0.35)"}} onClick={()=>{if(cart.length>0){waInquiry();}else{t2("Pehle + Inquiry karein!");}}}>
            <ShoppingCart size={16}/>
            {cart.length>0?"("+cart.length+")":"List"}
            {cart.length>0&&(<span className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-yellow-400 text-gray-900 text-[9px] font-black rounded-full flex items-center justify-center">{cart.length}</span>)}
          </button>
        </div>
        <p className="text-center text-xs font-black py-1.5 pb-2" style={{color:"rgba(180,80,20,0.5)"}}>{"Powered by "}<span style={{color:"rgba(234,88,12,0.8)",fontWeight:900}}>{"SupyMart"}</span>{" - supymart.app"}</p>
      </div>
    </div>
  );
}

const compressImg=(file,maxW,maxH,quality,cb)=>{
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new window.Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxW||h>maxH){const r=Math.min(maxW/w,maxH/h);w=Math.round(w*r);h=Math.round(h*r);}
      const canvas=document.createElement("canvas");
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      cb(canvas.toDataURL("image/jpeg",quality));
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
};

const scheduleBookingNotif=(oid,shopName,visitMs,cancelCharge)=>{
  if(!("Notification" in window)) return;
  const askAndSchedule=()=>{
    const reminderMs=visitMs-60*60*1000;
    const now=Date.now();
    if(reminderMs>now){
      const delay=reminderMs-now;
      setTimeout(()=>{
        if(Notification.permission==="granted"){
          new Notification("🏪 Booking Reminder — SupyMart",{body:"1 ghante mein aapki booking hai! Shop: "+shopName+" | ID: "+oid,icon:"/favicon.ico",tag:"booking-"+oid});
        }
      },Math.min(delay,2147483647));
    }
    const expiryMs=visitMs+24*60*60*1000;
    const expDelay=expiryMs-now-2*60*60*1000;
    if(expDelay>0){
      setTimeout(()=>{
        if(Notification.permission==="granted"){
          new Notification("⚠️ Booking Expiring Soon — SupyMart",{body:"Sirf 2 ghante bache hain! Abhi "+shopName+" pe jaiye. Cancel charge: Rs."+cancelCharge,icon:"/favicon.ico",tag:"exp-"+oid});
        }
      },Math.min(expDelay,2147483647));
    }
  };
  if(Notification.permission==="granted"){askAndSchedule();}
  else if(Notification.permission!=="denied"){Notification.requestPermission().then(p=>{if(p==="granted") askAndSchedule();});}
};

function ComboSelector({pF,sPF,lang="en"}) {
  const wts=pF.weights||[];
  const cls=pF.colors||[];
  const szs=pF.sizes||[];
  if(wts.length===0&&cls.length===0&&szs.length===0) return null;
  const wArr=wts.length>0?wts:[""];
  const cArr=cls.length>0?cls:[""];
  const sArr=szs.length>0?szs:[""];
  const combos=[];
  wArr.forEach(w=>cArr.forEach(c=>sArr.forEach(s=>{
    const parts=[w,c,s].filter(Boolean);
    combos.push(parts.join(" • "));
  })));
  const savedCombos=pF.combos||{};
  return (
    <div className="rounded-2xl p-2.5 mb-1" style={{background:"rgba(255,248,240,0.9)",border:"1.5px dashed rgba(234,88,12,0.2)"}}>

        {combos.map((combo,i)=>{
          const inStock=savedCombos[combo]!==false;
          return (
            <span key={i} onClick={()=>sPF(f=>({...f,combos:{...(f.combos||{}),[combo]:!(savedCombos[combo]!==false)}}))} className={"text-[10px] font-black px-2.5 py-1 rounded-xl border cursor-pointer transition-all "+(inStock?"bg-white text-gray-800 border-gray-300":"bg-gray-100 text-gray-400 border-gray-200 line-through")}>

function AToast({msg}){ if(!msg)return null; return(<div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-2xl font-black text-sm text-white shadow-2xl" style={{background:AAGR.primary,maxWidth:"88vw"}}>{msg}</div>); }
function ACard({children,style={}}){ return(<div className={AC.card} style={{background:"rgba(255,255,255,0.03)",...style}}>{children}</div>); }
function AStat({icon:Icon,label,value,sub,color,onClick}){
  return(
    <div className="rounded-2xl p-3.5 cursor-pointer active:scale-95 transition-all" style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)"}} onClick={onClick}>
      <div className="flex justify-between items-start mb-2">
        <div className="w-8 h-8 rounded-xl flex items-center justify-center" style={{background:color}}><Icon size={14} color="white"/></div>
        <span className="text-xl font-black text-white">{value}</span>
      </div>
      <p className="text-white/50 text-[11px] font-bold">{label}</p>
      {sub&&<p className="text-white/25 text-[9px] mt-0.5">{sub}</p>}
    </div>
  );
}

function AConfirmDialog({action,onCancel}) {
  if(!action) return null;
  return(
    <div className="fixed inset-0 flex items-center justify-center z-50 px-6" style={{background:"rgba(0,0,0,0.75)",backdropFilter:"blur(4px)"}}>
      <div className="w-full max-w-xs rounded-3xl p-6 text-center" style={{background:"linear-gradient(145deg,#1e293b,#0f172a)",border:"1px solid rgba(255,255,255,0.1)",boxShadow:"0 20px 60px rgba(0,0,0,0.5)"}}>
        <p className="text-4xl mb-3">{action.icon}</p>
        <p className="text-white font-black text-base mb-2">{"Pakka karo"}</p>
        <p className="text-white/50 text-sm mb-6">{action.msg}</p>
        <div className="flex gap-3">
          <button className="flex-1 py-3 rounded-2xl font-black text-white/50 text-sm" style={{background:"rgba(255,255,255,0.06)"}} onClick={onCancel}>{"Cancel"}</button>
          <button className="flex-1 py-3 rounded-2xl font-black text-white text-sm" style={{background:"linear-gradient(135deg,#ef4444,#dc2626)"}} onClick={action.onYes}>{"Haan, Karo"}</button>
        </div>
      </div>
    </div>
  );
}

function AdminPanel({onBack,lang="en"}) {
  const [authed,setAuthed]=useState(false);
  const [pwd,setPwd]=useState("");
  const [authErr,setAuthErr]=useState("");
  const [tab,setTab]=useState("dashboard");
  const [toast,setToast]=useState(null);
  const [search,setSearch]=useState("");
  const [broadcast,setBroadcast]=useState("");
  const [newPass,setNewPass]=useState("");
  const [adminPass,setAdminPass]=useState(ADMIN_PASS);
  const [lastRefresh,setLastRefresh]=useState(new Date());
  const [shops,setShops]=useState([]);
  const [confirmAction,setConfirmAction]=useState(null);
  const [prods,setProds]=useState([]);
  const [orders,setOrders]=useState([]);
  const [ads,setAds]=useState([]);
  const [coupons,setCoupons]=useState([]);
  const [adminWaitlist,setAdminWaitlist]=useState([]);

  const t2=(m)=>{setToast(m);setTimeout(()=>setToast(null),2800);};
  const now=Date.now();

  const ADMIN_90D=90*24*60*60*1000;
  const adminCleanOrders=raw=>raw.filter(o=>{
    if(!o.date)return true;
    const p=o.date.split("/");
    if(p.length!==3)return true;
    return new Date(p[2],p[1]-1,p[0]).getTime()>=Date.now()-ADMIN_90D;
  });
  const loadData=()=>{
    setShops(ls("bz_sh",[])); setProds(ls("bz_pr",[]));
    setOrders(adminCleanOrders(ls("bz_o",[]))); setAds(ls("bz_ads",[]));
    setCoupons(ls("bz_coup",[])); setAdminWaitlist(ls("bz_waitlist",[])); setLastRefresh(new Date());
    t2("✅ Refreshed!");
  };
  useEffect(()=>{if(authed)loadData();},[authed]);

  // ─ computed ─
  const activeAds=ads.filter(a=>a.expiresAt>now);
  const expiredAds=ads.filter(a=>a.expiresAt<=now);
  const adRevenue=ads.reduce((s,a)=>s+(a.price||0),0);
  const totalRev=orders.reduce((s,o)=>s+(o.total||0),0);
  const todayStr=new Date().toLocaleDateString("en-IN");
  const todayOrders=orders.filter(o=>o.date===todayStr);
  const todayRev=todayOrders.reduce((s,o)=>s+(o.total||0),0);
  const pendingBookings=orders.filter(o=>o.payMode==="book"&&o.status==="Booked"&&(o.bookingExpiry||0)>now);
  const outOfStock=prods.filter(p=>(p.stock||0)===0);
  const lowStock=prods.filter(p=>(p.stock||0)>0&&(p.stock||0)<=5);
  const activeCoupons=coupons.filter(c=>!c.expiresAt||c.expiresAt>now);
  const last7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-i);const dk=d.toLocaleDateString("en-IN");return{label:d.toLocaleDateString("en-IN",{weekday:"short"}),rev:orders.filter(o=>o.date===dk).reduce((s,o)=>s+(o.total||0),0)};}).reverse();
  const maxRev=Math.max(...last7.map(x=>x.rev),1);

  // ─ actions ─
  const delShop=(id)=>{setConfirmAction({msg:"Delete this shop and all its products? This cannot be undone.",icon:"🗑️",onYes:()=>{const s2=shops.filter(s=>s.id!==id);setShops(s2);ss("bz_sh",s2);const p2=prods.filter(p=>p.sid!==id);setProds(p2);ss("bz_pr",p2);t2("🗑️ Shop deleted!");setConfirmAction(null);}});};
  const togOpen=(id)=>{const u=shops.map(s=>s.id===id?{...s,open:!s.open}:s);setShops(u);ss("bz_sh",u);t2("✅ Status updated!");};
  const togVerified=(id)=>{const u=shops.map(s=>s.id===id?{...s,verified:!s.verified}:s);setShops(u);ss("bz_sh",u);t2("✅ Verification updated!");};
  const togFeatured=(id)=>{const u=shops.map(s=>s.id===id?{...s,featured:!s.featured}:s);setShops(u);ss("bz_sh",u);t2("⭐ Featured updated!");};
  const activatePlan=(shopId,planId,days)=>{
    const plan=SHOP_PLANS.find(p=>p.id===planId)||SHOP_PLANS[1];
    const u=shops.map(s=>s.id===shopId?{...s,plan:plan.id,planLabel:plan.label,planBadge:plan.badge,planEnd:Date.now()+days*86400000,maxProds:plan.prods}:s);
    setShops(u);ss("bz_sh",u);t2(plan.badge+" Plan activated! +"+days+" days");
  };
  const delProd=(id)=>{setConfirmAction({msg:"Delete this product?",icon:"🗑️",onYes:()=>{const u=prods.filter(p=>p.id!==id);setProds(u);ss("bz_pr",u);t2("🗑️ Product deleted!");setConfirmAction(null);}});};
  const delAd=(id)=>{setConfirmAction({msg:"Remove this ad?",icon:"🗑️",onYes:()=>{const u=ads.filter(a=>a.id!==id);setAds(u);ss("bz_ads",u);t2("🗑️ Ad removed!");setConfirmAction(null);}});};
  const extendAd=(id,days)=>{const u=ads.map(a=>a.id===id?{...a,expiresAt:Math.max(a.expiresAt,now)+days*86400000}:a);setAds(u);ss("bz_ads",u);t2("✅ Extended +"+days+"d!");};
  const cleanAds=()=>{const u=ads.filter(a=>a.expiresAt>now);const removed=ads.length-u.length;setAds(u);ss("bz_ads",u);t2("🧹 "+removed+" expired ads removed!");};
  const updOrder=(id,status)=>{const u=orders.map(o=>o.id===id?{...o,status,step:["Confirmed","Preparing","Out for Delivery","Delivered","Cancelled"].indexOf(status)}:o);setOrders(u);ss("bz_o",u);t2("✅ Order updated!");};
  const delCoupon=(id)=>{const u=coupons.filter(c=>c.id!==id);setCoupons(u);ss("bz_coup",u);t2("🗑️ Coupon deleted!");};

  const TABS=[
    {id:"dashboard",icon:BarChart2,label:"Dash"},
    {id:"shops",icon:Store,label:"Shops"},
    {id:"products",icon:Package,label:"Products"},
    {id:"orders",icon:ShoppingBag,label:"Orders"},
    {id:"ads",icon:Radio,label:"Ads"},
    {id:"coupons",icon:Tag,label:"Coupons"},
    {id:"waitlist",icon:Clock,label:"Waitlist"},
    {id:"broadcast",icon:Bell,label:"Broadcast"},
    {id:"settings",icon:Settings,label:"Settings"},
  ];

  if(!authed){
    return(
      <div className="min-h-screen flex items-center justify-center p-6" style={{background:"linear-gradient(145deg,#0f172a,#1e293b)"}}>
        <div className="w-full max-w-sm">
          <div className="text-center mb-8">
            <div className="w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-4" style={{background:AGR.primary}}><Shield size={36} color="white"/></div>
            <h1 className="text-3xl font-black text-white">Admin Panel</h1>
            <p className="text-white/30 text-sm mt-1">Restricted Access Only</p>
          </div>
          <ACard>
            <p className="text-white/40 text-xs font-bold mb-2">Admin Password</p>
            <input className={AC.inp} placeholder="Password..." value={pwd} type="password" onChange={e=>setPwd(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
            <p className="text-white/20 text-[10px] mt-1.5 mb-3">Default: admin@123</p>
            {authErr&&<div className="rounded-xl p-2.5 mb-3" style={{background:"rgba(239,68,68,0.12)",border:"1px solid rgba(239,68,68,0.2)"}}><p className="text-red-400 text-xs font-bold">{authErr}</p></div>}
            <button className="w-full py-3.5 rounded-2xl font-black text-white" style={{background:AGR.primary}} onClick={handleLogin}>🔐 Login</button>
          </ACard>
        </div>
      </div>
    );
  }

  function handleLogin(){
    if(pwd.trim()===adminPass){setAuthed(true);setAuthErr("");}
    else setAuthErr("❌ Wrong password!");
  }

  const fShops=shops.filter(s=>(s.name+s.loc+"").toLowerCase().includes(search.toLowerCase()));
  const fProds=prods.filter(p=>(p.name+"").toLowerCase().includes(search.toLowerCase()));
  const fOrders=orders.filter(o=>(o.id+o.shopName+"").toLowerCase().includes(search.toLowerCase()));
  const fAds=ads.filter(a=>(a.shopName+"").toLowerCase().includes(search.toLowerCase()));

  return(
    <div className="min-h-screen max-w-md mx-auto pb-10" style={{background:"linear-gradient(160deg,#0f172a,#1e293b)"}}>
      <AToast msg={toast}/>
      <AConfirmDialog action={confirmAction} onCancel={()=>setConfirmAction(null)}/>

      {/* Header */}
      <div className="sticky top-0 z-40 px-4 py-3 flex items-center justify-between" style={{background:AGR.header,borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
        <div>
          <p className="text-white font-black text-sm flex items-center gap-1.5"><Shield size={13} className="text-purple-400"/>Admin Panel</p>
          <p className="text-white/25 text-[9px]">{lastRefresh.toLocaleTimeString("en-IN")}</p>
        </div>
        <div className="flex gap-1.5">
          <button className="w-8 h-8 rounded-xl flex items-center justify-center" style={{background:"rgba(255,255,255,0.05)"}} onClick={loadData}><RefreshCw size={13} className="text-white/40"/></button>
          <button className="w-8 h-8 rounded-xl flex items-center justify-center" style={{background:"rgba(255,255,255,0.05)"}} onClick={()=>{setAuthed(false);if(onBack)onBack();}}><LogOut size={13} className="text-white/40"/></button>
        </div>
      </div>

      {/* Tab bar */}
      <div className="flex overflow-x-auto gap-1 px-3 py-2" style={{scrollbarWidth:"none"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);setSearch("");}} className="flex-shrink-0 flex items-center gap-1 px-2.5 py-1.5 rounded-xl text-[10px] font-black transition-all" style={{background:tab===t.id?AGR.primary:"rgba(255,255,255,0.04)",color:tab===t.id?"white":"rgba(255,255,255,0.35)"}}>
            <t.icon size={10}/>{t.label}
          </button>
        ))}
      </div>

      <div className="px-4 space-y-3">

        {/* DASHBOARD */}
        {tab==="dashboard"&&(
          <div className="space-y-3">
            <div className="grid grid-cols-2 gap-2 items-stretch">
              <AStat icon={Store} label="Total Shops" value={shops.length} sub={shops.filter(s=>s.open).length+" open • "+shops.filter(s=>s.verified).length+" verified"} color={AGR.primary} onClick={()=>setTab("shops")}/>
              <AStat icon={Package} label="Products" value={prods.length} sub={outOfStock.length+" out of stock"} color={AGR.orange} onClick={()=>setTab("products")}/>
              <AStat icon={ShoppingBag} label="Orders" value={orders.length} sub={todayOrders.length+" today"} color={AGR.success} onClick={()=>setTab("orders")}/>
              <AStat icon={Radio} label="Active Ads" value={activeAds.length} sub={expiredAds.length+" expired"} color={AGR.danger} onClick={()=>setTab("ads")}/>
            </div>

            {/* Revenue */}
            <div className="rounded-2xl p-4" style={{background:"rgba(99,102,241,0.1)",border:"1px solid rgba(99,102,241,0.2)"}}>
              <p className="text-white/30 text-[10px] font-black mb-1">💰 TOTAL REVENUE</p>
              <p className="text-3xl font-black text-white">{"Rs."+totalRev.toLocaleString("en-IN")}</p>
              <div className="flex gap-4 mt-2 pt-2" style={{borderTop:"1px solid rgba(255,255,255,0.05)"}}>
                <div><p className="text-[9px] text-white/25">Today</p><p className="text-sm font-black text-green-400">{"Rs."+todayRev}</p></div>
                <div><p className="text-[9px] text-white/25">Ad Revenue</p><p className="text-sm font-black text-purple-400">{"Rs."+adRevenue}</p></div>
                <div><p className="text-[9px] text-white/25">Coupons</p><p className="text-sm font-black text-yellow-400">{activeCoupons.length+" active"}</p></div>
              </div>
            </div>

            {/* 7-day chart */}
            <ACard>
              <p className="text-white/30 text-[10px] font-black mb-3">📈 LAST 7 DAYS</p>
              <div className="flex items-end gap-1.5" style={{height:"64px"}}>
                {last7.map((d,i)=>(
                  <div key={i} className="flex-1 flex flex-col items-center gap-1">
                    <div className="w-full rounded-t-lg" style={{height:Math.max(3,Math.round((d.rev/maxRev)*48))+"px",background:d.rev>0?AGR.primary:"rgba(255,255,255,0.05)"}}/>
                    <p className="text-[8px] text-white/25">{d.label}</p>
                  </div>
                ))}
              </div>
              {last7.every(d=>d.rev===0)&&<p className="text-center text-white/15 text-xs mt-1">No orders yet</p>}
            </ACard>

            {/* Alerts */}
            {(pendingBookings.length>0||outOfStock.length>0||lowStock.length>0||expiredAds.length>0)&&(
              <div className="space-y-2">
                <p className="text-white/25 text-[10px] font-black uppercase">⚠️ Alerts</p>
                {pendingBookings.length>0&&(<div className="rounded-xl p-3 flex items-center gap-2" style={{background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.15)"}}><AlertTriangle size={13} className="text-yellow-400 flex-shrink-0"/><p className="text-yellow-300 text-xs font-bold flex-1">{pendingBookings.length} bookings awaited</p><button className="text-yellow-400 text-[10px] font-black" onClick={()=>setTab("orders")}>View →</button></div>)}
                {outOfStock.length>0&&(<div className="rounded-xl p-3 flex items-center gap-2" style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.15)"}}><Package size={13} className="text-red-400 flex-shrink-0"/><p className="text-red-300 text-xs font-bold flex-1">{outOfStock.length} out of stock</p><button className="text-red-400 text-[10px] font-black" onClick={()=>setTab("products")}>View →</button></div>)}
                {lowStock.length>0&&(<div className="rounded-xl p-3 flex items-center gap-2" style={{background:"rgba(234,88,12,0.08)",border:"1px solid rgba(234,88,12,0.15)"}}><AlertTriangle size={13} className="text-orange-400 flex-shrink-0"/><p className="text-orange-300 text-xs font-bold">{lowStock.length} low stock (≤5)</p></div>)}
                {expiredAds.length>0&&(<div className="rounded-xl p-3 flex items-center gap-2" style={{background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.15)"}}><Radio size={13} className="text-purple-400 flex-shrink-0"/><p className="text-purple-300 text-xs font-bold flex-1">{expiredAds.length} expired ads</p><button className="text-purple-400 text-[10px] font-black" onClick={cleanAds}>Clean →</button></div>)}
              </div>
            )}

            {/* Recent orders */}
            <ACard>
              <p className="text-white/25 text-[10px] font-black uppercase mb-2">Recent Orders</p>
              {orders.slice(0,5).map(o=>(
                <div key={o.id} className="flex justify-between items-center py-2 border-b border-white/5">
                  <div><p className="text-white text-xs font-black">{o.id}</p><p className="text-white/25 text-[10px]">{o.shopName+" • "+o.date}</p></div>
                  <div className="text-right"><p className="text-green-400 text-xs font-black">{"Rs."+o.total}</p><span className={AC.badge} style={{background:A_STATUS_BG[o.status]||"rgba(255,255,255,0.08)",color:A_STATUS_FG[o.status]||"white"}}>{o.status}</span></div>
                </div>
              ))}
              {!orders.length&&<p className="text-white/15 text-xs text-center py-3">No orders yet</p>}
            </ACard>
          </div>
        )}

        {/* SHOPS */}
        {tab==="shops"&&(
          <div className="space-y-3">
            <div className="flex gap-2 items-center">
              <input className={AC.inp} placeholder="Search shops..." value={search} onChange={e=>setSearch(e.target.value)}/>
              <span className="text-white/25 text-xs font-bold flex-shrink-0">{fShops.length}</span>
            </div>
            <div className="flex gap-1.5 flex-wrap">
              {[["All",shops.length,""],["Open",shops.filter(s=>s.open).length,"open"],["Verified",shops.filter(s=>s.verified).length,"verified"],["Featured",shops.filter(s=>s.featured).length,"featured"]].map(([l,v,f])=>(
                <button key={l} className="text-[10px] font-black px-2.5 py-1 rounded-xl" style={{background:"rgba(255,255,255,0.05)",color:"rgba(255,255,255,0.4)"}} onClick={()=>setSearch(f)}>{l} ({v})</button>
              ))}
            </div>
            {fShops.map(s=>(
              <ACard key={s.id}>
                <div className="flex gap-3 mb-3">
                  <div className="w-11 h-11 rounded-xl overflow-hidden flex-shrink-0 flex items-center justify-center" style={{background:"rgba(255,255,255,0.05)"}}>
                    {s.img&&s.img!=="[large-img]"?<img src={s.img} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<Store size={18} className="text-white/25"/>}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-1.5 flex-wrap">
                      <p className="text-white font-black text-sm truncate">{s.name}</p>
                      {s.verified&&<span className={AC.badge} style={{background:"rgba(16,185,129,0.15)",color:"#6ee7b7"}}>✅ Verified</span>}
                      {s.featured&&<span className={AC.badge} style={{background:"rgba(245,158,11,0.15)",color:"#fcd34d"}}>⭐ Featured</span>}
                    </div>
                    <p className="text-white/25 text-[10px] flex items-center gap-1"><MapPin size={8}/>{s.loc}</p>
                    <div className="flex items-center gap-2 mt-1">
                      <span className={AC.badge} style={{background:s.open?"rgba(16,185,129,0.12)":"rgba(239,68,68,0.12)",color:s.open?"#6ee7b7":"#f87171"}}>{s.open?"🟢 Open":"🔴 Closed"}</span>
                      <span className="text-[9px] text-white/25">{s.cat}</span>
                      <span className="text-[9px] text-white/25 flex items-center gap-0.5"><Star size={7}/>{s.rating}</span>
                      <span className="text-[9px] text-white/25 flex items-center gap-0.5"><Eye size={7}/>{s.views||0}</span>
                    </div>
                  </div>
                </div>
                <div className="flex gap-1.5 flex-wrap">
                  <button className="text-[10px] font-black px-2 py-1.5 rounded-lg" style={{background:s.open?"rgba(239,68,68,0.12)":"rgba(16,185,129,0.12)",color:s.open?"#f87171":"#6ee7b7"}} onClick={()=>togOpen(s.id)}>{s.open?"🔴 Close":"🟢 Open"}</button>
                  <button className="text-[10px] font-black px-2 py-1.5 rounded-lg" style={{background:"rgba(16,185,129,0.12)",color:"#6ee7b7"}} onClick={()=>togVerified(s.id)}>{s.verified?"Unverify":"✅ Verify"}</button>
                  <button className="text-[10px] font-black px-2 py-1.5 rounded-lg" style={{background:"rgba(245,158,11,0.12)",color:"#fcd34d"}} onClick={()=>togFeatured(s.id)}>{s.featured?"Unfeature":"⭐ Feature"}</button>
                  <button className="text-[10px] font-black px-2 py-1.5 rounded-lg" style={{background:"rgba(99,102,241,0.12)",color:"#a5b4fc"}} onClick={()=>wa(s.phone,"Hi "+s.name+"! Admin contact.")}><MessageCircle size={9} className="inline mr-0.5"/>WA</button>
                  <button className="text-[10px] font-black px-2 py-1.5 rounded-lg" style={{background:"rgba(239,68,68,0.12)",color:"#f87171"}} onClick={()=>delShop(s.id)}><X size={9} className="inline mr-0.5"/>Del</button>
                </div>
                <p className="text-white/15 text-[9px] mt-2">Products: {prods.filter(p=>p.sid===s.id).length} • Orders: {orders.filter(o=>o.shopName===s.name).length} • Followers: {s.followers||0}{s.upi?(" • UPI: "+s.upi):""}{s.phone?(" • 📱 "+s.phone):""}</p>
                {/* Subscription */}
                <div className="mt-2 pt-2" style={{borderTop:"1px solid rgba(255,255,255,0.06)"}}>
                  <div className="flex items-center gap-2 mb-1.5">
                    <span className="text-[10px] font-black" style={{color:s.planEnd&&s.planEnd>Date.now()?"#6ee7b7":"#f87171"}}>
                      {(s.planBadge||"🆓")+" "+(s.planLabel||"Trial")+" — "+(s.planEnd&&s.planEnd>Date.now()?Math.ceil((s.planEnd-Date.now())/86400000)+" din bacha":"EXPIRED")}
                    </span>
                  </div>
                  <div className="flex gap-1 flex-wrap">

        {/* ORDERS */}

                  <span className="text-white/25 text-[10px] font-bold">Extend:</span>

              </ACard>
            ))}
            {!fAds.length&&<p className="text-center text-white/15 py-8 text-sm">No ads</p>}
          </div>
        )}

        {/* COUPONS */}
        {tab==="coupons"&&(
          <div className="space-y-3">
            <div className="rounded-xl p-3" style={{background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.15)"}}>
              <p className="text-white/25 text-[10px] font-bold">Active Coupons</p>
              <p className="text-xl font-black text-yellow-300">{activeCoupons.length} <span className="text-sm text-white/25">/ {coupons.length} total</span></p>
            </div>
            {!coupons.length?<p className="text-center text-white/15 py-8 text-sm">No coupons yet</p>:coupons.map(cp=>{
              const shop=shops.find(s=>s.id===cp.shopId);
              const isActive=!cp.expiresAt||cp.expiresAt>now;

                <ACard key={cp.id}>
                  <div className="flex justify-between items-start">
                    <div>
                      <div className="flex items-center gap-2 mb-0.5">
                        <p className="text-yellow-300 font-black text-base">{cp.code}</p>
                        <span className={AC.badge} style={{background:isActive?"rgba(16,185,129,0.15)":"rgba(239,68,68,0.15)",color:isActive?"#6ee7b7":"#f87171"}}>{isActive?"Active":"Expired"}</span>
                      </div>
                      <p className="text-white/35 text-[10px]">{cp.type==="percent"?cp.value+"% off":"Rs."+cp.value+" off"}{cp.maxDisc?" (max Rs."+cp.maxDisc+")":""}</p>
                      <p className="text-white/25 text-[10px]">Shop: {shop?.name||"?"}{cp.minOrder?" • Min Rs."+cp.minOrder:""}</p>
                      {cp.expiresAt&&<p className="text-white/15 text-[9px]">Expires: {new Date(cp.expiresAt).toLocaleDateString("en-IN")}</p>}
                    </div>
                    <button onClick={()=>delCoupon(cp.id)}><X size={13} className="text-red-400/35"/></button>
                  </div>
                </ACard>
              );
            })}
          </div>
        )}

        {/* WAITLIST */}
        {tab==="waitlist"&&(
          <div className="space-y-3">
            <div className="grid grid-cols-3 gap-2">
              {[["Waiting",adminWaitlist.filter(w=>w.status==="waiting").length,"rgba(245,158,11,0.15)","#fcd34d"],["Active",adminWaitlist.filter(w=>w.status==="active").length,"rgba(16,185,129,0.15)","#6ee7b7"],["Total",adminWaitlist.length,"rgba(255,255,255,0.05)","white"]].map(([l,v,bg,col])=>(
                <div key={l} className="rounded-xl p-2.5 text-center" style={{background:bg}}>
                  <p className="font-black text-lg" style={{color:col}}>{v}</p>
                  <p className="text-white/30 text-[10px]">{l}</p>
                </div>
              ))}
            </div>
            {adminWaitlist.length===0?(
              <p className="text-center text-white/15 py-8 text-sm">No waitlist entries yet</p>
            ):adminWaitlist.map((w)=>{
              const isWaiting=w.status==="waiting";
              const qPos=adminWaitlist.filter(x=>x.status==="waiting").indexOf(w)+1;
              return(
                <ACard key={w.id}>
                  <div className="flex justify-between items-start mb-2">
                    <div>
                      <div className="flex items-center gap-2 mb-0.5">
                        <p className="text-white font-black text-sm">{w.shopName}</p>
                        <span className={AC.badge} style={{background:isWaiting?"rgba(245,158,11,0.2)":"rgba(16,185,129,0.2)",color:isWaiting?"#fcd34d":"#6ee7b7"}}>{isWaiting?"⏳ Waiting":"✅ Active"}</span>
                      </div>
                      <p className="text-white/35 text-[10px]">{w.badge+" "+w.label+" • Rs."+w.price+" • "+w.days+" din"}</p>
                      <p className="text-white/25 text-[10px]">{"Joined: "+new Date(w.joinedAt).toLocaleDateString("en-IN")}</p>
                      {isWaiting&&(<p className="text-yellow-400 text-[10px] font-bold">{"Queue: #"+qPos+" position"}</p>)}
                      {w.status==="active"&&w.activatedAt&&(<p className="text-green-400 text-[10px]">{"Activated: "+new Date(w.activatedAt).toLocaleDateString("en-IN")}</p>)}
                    </div>
                    <button onClick={()=>wa(w.shopPhone,"Hello "+w.shopName+"! Aapka ad slot update ke baare mein contact kar rahe hain.")}><MessageCircle size={14} className="text-purple-400/60"/></button>
                  </div>
                  {isWaiting&&(
                    <div className="flex gap-1.5">
                      <button className="text-[10px] font-black px-2.5 py-1.5 rounded-lg flex-1" style={{background:"rgba(16,185,129,0.15)",color:"#6ee7b7"}} onClick={()=>{
                        const now2=Date.now();
                        const newAd={id:now2,plan:w.plan,label:w.label,price:w.price,days:w.days,badge:w.badge,banner:w.banner||"",shopId:w.shopId,shopName:w.shopName,shopCat:w.shopCat,shopImg:w.shopImg||"",shopLoc:w.shopLoc||"",expiresAt:now2+w.days*24*60*60*1000,fromWaitlist:true};
                        const curAds=ls("bz_ads",[]);
                        curAds.unshift(newAd);
                        ss("bz_ads",curAds);
                        const updWait=adminWaitlist.map(x=>x.id===w.id?{...x,status:"active",activatedAt:now2}:x);
                        setAdminWaitlist(updWait);
                        ss("bz_waitlist",updWait);
                        wa(w.shopPhone,"🎉 *Aapka Ad Live Ho Gaya!*\n\nShop: "+w.shopName+"\nPlan: "+w.badge+" "+w.label+"\nValid till: "+new Date(now2+w.days*24*60*60*1000).toLocaleDateString("en-IN")+"\n\n_Team SupyMart_");
                        t2("✅ Ad activated! WhatsApp bheja.");
                        loadData();
                      }}>{"⚡ Manual Activate"}</button>
                      <button className="text-[10px] font-black px-2.5 py-1.5 rounded-lg" style={{background:"rgba(239,68,68,0.15)",color:"#f87171"}} onClick={()=>{
                        const updWait=adminWaitlist.filter(x=>x.id!==w.id);
                        setAdminWaitlist(updWait);
                        ss("bz_waitlist",updWait);
                        t2("🗑️ Removed from waitlist");
                      }}>{"Remove"}</button>
                    </div>
                  )}
                </ACard>
              );
            })}
          </div>
        )}

        {/* BROADCAST */}
        {tab==="broadcast"&&(
          <div className="space-y-3">
            <ACard>
              <p className="text-white font-black text-sm mb-1">📢 Broadcast Message</p>
              <p className="text-white/30 text-xs">Sabhi shopkeepers ko message</p>
            </ACard>
            <textarea className={AC.inp+" resize-none"} style={{minHeight:"110px"}} placeholder="Message likhein..." value={broadcast} onChange={e=>setBroadcast(e.target.value)}/>
            <button className="w-full py-3 rounded-2xl font-black text-white text-sm flex items-center justify-center gap-2" style={{background:"linear-gradient(135deg,#25d366,#128c7e)"}} onClick={()=>{
              if(!broadcast?.trim()){t2("Message likhein!");return;}
              const phones=[...new Set(shops.map(s=>s.phone).filter(Boolean))];
              if(!phones.length){t2("No shops found!");return;}
              wa(phones[0],"📢 *Admin Message*\n\n"+broadcast+"\n\n_Team SupyMart_");
              t2("WhatsApp open hua!");
            }}>
              <MessageCircle size={15}/>Send to {shops.length} Shops
            </button>
            <ACard>
              <p className="text-white/25 text-[10px] font-black uppercase mb-2.5">📊 Platform Summary</p>
              {[["Total Shops",shops.length],["Open Shops",shops.filter(s=>s.open).length],["Verified Shops",shops.filter(s=>s.verified).length],["Total Products",prods.length],["Out of Stock",outOfStock.length],["Total Orders",orders.length],["Pending Bookings",pendingBookings.length],["Active Ads",activeAds.length],["Active Coupons",activeCoupons.length],["Total Revenue","Rs."+totalRev.toLocaleString("en-IN")],["Ad Revenue","Rs."+adRevenue],["Today Revenue","Rs."+todayRev]].map(([l,v])=>(
                <div key={l} className="flex justify-between py-1 border-b border-white/5"><span className="text-white/35 text-xs">{l}</span><span className="text-white font-black text-xs">{v}</span></div>
              ))}
            </ACard>
          </div>
        )}

        {/* SETTINGS */}
        {tab==="settings"&&(
          <div className="space-y-3">
            <ACard>
              <p className="text-white font-black text-sm mb-3">🔐 Change Password</p>
              <input className={AC.inp+" mb-2"} placeholder="Naya password (min 6 chars)..." value={newPass} type="password" onChange={e=>setNewPass(e.target.value)}/>
              <button className="w-full py-2.5 rounded-xl font-black text-white text-sm" style={{background:AGR.primary}} onClick={()=>{
                if(!newPass.trim()||newPass.length<6){t2("Min 6 characters!");return;}
                setAdminPass(newPass);setNewPass("");t2("✅ Password changed (session only)!");
              }}>Change Password</button>
              <p className="text-white/15 text-[10px] mt-2">{"Permanent: change ADMIN_PASS in code."}</p>
            </ACard>
            <ACard>
              <p className="text-white font-black text-sm mb-2">⚡ Quick Actions</p>
              <div className="space-y-2">
                <button className="w-full py-2.5 rounded-xl font-black text-sm" style={{background:"rgba(239,68,68,0.1)",color:"#f87171"}} onClick={cleanAds}>🧹 Clean Expired Ads ({expiredAds.length})</button>
                <button className="w-full py-2.5 rounded-xl font-black text-sm" style={{background:"rgba(99,102,241,0.1)",color:"#a5b4fc"}} onClick={loadData}>🔄 Refresh All Data</button>
                <button className="w-full py-2.5 rounded-xl font-black text-sm" style={{background:"rgba(16,185,129,0.1)",color:"#6ee7b7"}} onClick={()=>{
                  const exportData={shops,prods,orders,ads,coupons,exportedAt:new Date().toISOString()};
                  const blob=new Blob([JSON.stringify(exportData,null,2)],{type:"application/json"});
                  const url=URL.createObjectURL(blob);
                  const a=document.createElement("a");
                  a.href=url;a.download="supymart-data-"+new Date().toLocaleDateString("en-IN").replace(/\//g,"-")+".json";
                  a.click();URL.revokeObjectURL(url);
                  t2("✅ Data exported!");
                }}>📥 Export All Data (JSON)</button>
                <button className="w-full py-2.5 rounded-xl font-black text-sm" style={{background:"rgba(245,158,11,0.1)",color:"#fcd34d"}} onClick={()=>setConfirmAction({msg:"Logout from admin panel?",icon:"🚪",onYes:()=>{setAuthed(false);if(onBack)onBack();setConfirmAction(null);}})}>🚪 Logout</button>
              </div>
            </ACard>
            <ACard>
              <p className="text-white font-black text-sm mb-2">ℹ️ System Info</p>
              {[["localStorage Size",(JSON.stringify(localStorage).length/1024).toFixed(1)+" KB"],["Shops",shops.length],["Products",prods.length],["Orders",orders.length],["Ads",ads.length],["Coupons",coupons.length]].map(([l,v])=>(
                <div key={l} className="flex justify-between py-1 border-b border-white/5"><span className="text-white/30 text-xs">{l}</span><span className="text-white/60 font-black text-xs">{v}</span></div>
              ))}
            </ACard>
          </div>
        )}

      </div>
    </div>
  );
}

export default function App() {
  const [lang,sLang]=useState(()=>ls("bz_lang","en"));
  const [vLangMenu,sVLM]=useState(false);
  const t=k=>tl(lang,k);
  const [user,sUser]=useState(()=>ls("bz_u",{name:"",phone:"",isMerchant:false,shopDetails:null,isLoggedIn:false}));
  const [tab,sTab]=useState("home");
  const [cart,sCart]=useState(()=>ls("bz_c",[]));
  const [wl,sWl]=useState(()=>{
    const saved=ls("bz_wl",[]);
    return saved.map(x=>String(x));
  });
  const [follows,sFollows]=useState(()=>ls("bz_fl",[]));
  const [vFollows,sVFollows]=useState(false);
  const NINETY_DAYS=90*24*60*60*1000;
  const cleanOldOrders=rawOrders=>{

          )}
          {mMode==="coupons" && (
            <div className="space-y-3">

              {coupons.filter(cp=>cp.shopId===myShop.id).length===0?(

                      <p className="font-black text-base text-orange-600">{cp.code}</p>
                      <p className="text-xs text-gray-600">{cp.type==="percent"?cp.value+"% off":("Rs."+cp.value+" off")}{cp.maxDisc?" (max Rs."+cp.maxDisc+")":""}</p>
                      <p className="text-xs text-gray-400">{cp.minOrder?"Min order: Rs."+cp.minOrder:""}{cp.expiresAt?" • Expires: "+new Date(cp.expiresAt).toLocaleDateString("en-IN"):""}</p>
                    </div>
                    <div className="flex flex-col items-end gap-1">
                      <span className={cp.expiresAt&&cp.expiresAt<Date.now()?"text-[10px] bg-red-100 text-red-500 px-2 py-0.5 rounded-full font-black":"text-[10px] bg-green-100 text-green-600 px-2 py-0.5 rounded-full font-black"}>{cp.expiresAt&&cp.expiresAt<Date.now()?"Expired":"Active"}</span>
                      <button onClick={()=>{sCoupons(p=>p.filter(x=>x.id!==cp.id));t2("Coupon deleted");}}><Trash2 size={14} className="text-red-300"/></button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
          {mMode==="analytics" && (
            <div className="space-y-4">
              <h3 className="font-black text-gray-700">{"📈 Sales Analytics"}</h3>
              <AnalyticsPanel myShop={myShop} orders={orders} prods={prods}/>
            </div>
          )}
        </div>
      )}
      {tab==="admin"&&(<div style={{paddingBottom:"80px"}}/>)}
      {!q && tab==="account" && (

          <div className="rounded-3xl p-5 mb-4 text-white" style={{background:GR.header,boxShadow:SHADOW.xl,border:"1px solid rgba(255,150,80,0.15)"}}>
            <div className="flex items-center gap-4 mb-4">
              <div>
                {user.photo
                  ? (<img src={user.photo} alt="profile" style={{width:"64px",height:"64px",borderRadius:"50%",objectFit:"cover",border:"2px solid rgba(255,255,255,0.5)",display:"block"}}/>)

                }
              </div>
              <div className="flex-1 min-w-0">
                <p className="font-black text-lg leading-tight truncate">{user.name}</p>
                <div className="flex items-center gap-2 mt-0.5">
                  <p className="text-orange-200 text-xs">{user.phone?(user.hidePhone?"🔒 +91 ●●●●●"+user.phone.slice(-3):"+91 "+user.phone):"Guest User"}</p>
                  {user.phone&&(<button onClick={()=>sUser(u=>({...u,hidePhone:!u.hidePhone}))} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:"999px",padding:"1px 8px",color:"white",fontSize:"9px",fontWeight:900,cursor:"pointer"}}>{user.hidePhone?"Show":"Hide"}</button>)}

              </div>

            </div>
            <button className="w-full bg-white/15 border border-white/25 rounded-2xl py-2 text-white text-xs font-black flex items-center justify-center gap-1.5" onClick={()=>{sProfF({name:user.name,photo:user.photo||""});sVEP(true);}}>
              <Edit2 size={12}/>{" Edit Profile"}
            </button>
            {isAdmin&&(
              <button className="w-full mt-2 rounded-2xl py-2 text-xs font-black flex items-center justify-center gap-1.5 active:scale-95 transition-all" style={{background:"rgba(0,0,0,0.35)",border:"1px solid rgba(255,255,255,0.15)",color:"white"}} onClick={()=>sTab("admin")}>
                <Shield size={12}/>{" 🔐 Admin Panel"}
              </button>
            )}
          </div>

          {vEditProf && (
            <div className="fixed inset-0 flex items-end justify-center" style={{zIndex:9999,background:"rgba(0,0,0,0.82)"}} onClick={()=>sVEP(false)}>
              <div className="bg-white rounded-t-3xl w-full max-w-md p-6" onClick={e=>e.stopPropagation()}>
                <div className="flex justify-between items-center mb-5">
                  <h2 className="font-black text-lg">Edit Profile</h2>
                  <button className="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center" onClick={()=>sVEP(false)}><X size={16}/></button>
                </div>
                <div className="flex flex-col items-center mb-5">
                  <div className="relative mb-3">
                    {profF.photo
                      ? (<img src={profF.photo} alt="preview" style={{width:"96px",height:"96px",borderRadius:"50%",objectFit:"cover",border:"4px solid #ffedd5",display:"block"}}/>)
                      : (<div style={{width:"96px",height:"96px",borderRadius:"50%",background:"#fff7ed",border:"4px solid #ffedd5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"36px"}}>{"👤"}</div>)
                    }
                    <input id="prof-img-input" type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;if(f.size>10*1024*1024){t2("Image 10MB se badi hai!");return;}compressImg(f,400,400,0.75,result=>sProfF(p=>({...p,photo:result})));t2(tl(lang,"photoCompressing"));}}/>

                    <button style={{position:"absolute",bottom:0,right:0,background:"#ea580c",borderRadius:"50%",padding:"8px",boxShadow:"0 2px 8px rgba(0,0,0,0.2)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>document.getElementById("prof-img-input").click()}>
                      <Upload size={14} color="white"/>
                    </button>
                  </div>
                  <p className="text-xs text-gray-400">{"Tap camera icon to change photo"}</p>
                </div>
                <div className="space-y-3">
                  <div>
                    <p className="text-xs font-black text-gray-500 mb-1">Name</p>
                    <input className={C.inp} style={{background:"rgba(255,255,255,0.85)",border:"1.5px solid rgba(234,88,12,0.12)",backdropFilter:"blur(4px)"}} placeholder="Your Name" value={profF.name} onChange={e=>sProfF(f=>({...f,name:e.target.value}))}/>
                  </div>
                  <button className={C.btn+" "+C.or+" w-full"} style={{background:GR.primary,boxShadow:SHADOW.btn}} onClick={()=>{if(!profF.name.trim()){t2("Enter name");return;}sUser(u=>({...u,name:profF.name,photo:profF.photo}));if(myShop&&profF.photo){sShops(sh=>sh.map(s=>s.id===myShop.id?{...s,img:profF.photo}:s));sUser(u=>({...u,shopDetails:{...u.shopDetails,img:profF.photo}}));}sVEP(false);t2("Profile updated!");}}>
                    Save Changes
                  </button>
                </div>
              </div>
            </div>
          )}

          <div className="rounded-3xl mb-4 overflow-hidden" style={{background:"rgba(255,255,255,0.92)",boxShadow:SHADOW.card,border:"1px solid rgba(255,255,255,0.95)",backdropFilter:"blur(8px)"}}>
            {[
              {ico:"📦",label:t("orders"),val:orders.length,action:()=>sVO(true)},
              {ico:"❤️",label:t("wishlist"),val:wl.length,action:()=>sVWl(true)},
              {ico:"🏪",label:"Followed Shops",val:follows.length,action:()=>sVFollows(true)},
              {ico:"📍",label:t("addresses"),val:addrs.length,action:()=>sVA(true)},
              {ico:"📒",label:t("khata"),val:khata.length,action:()=>sVK(true)},
              {ico:"📢",label:"Advertise with Us",val:"",action:()=>sVBA(true)},
              {ico:"💬",label:t("support"),val:"",action:()=>wa(ADMIN,tl(lang,"waSupport"))},
              {ico:"🌐",label:"Language",val:LANGS.find(l=>l.code===lang)?.label||"EN",action:()=>sVLM(v=>!v)},
              {ico:"📜",label:"Terms & Privacy",val:"",action:()=>sVTr(true)},
            ].map((item,i,arr)=>(
              <button key={i} className="w-full flex items-center gap-3 px-4 py-3.5 active:bg-orange-50 transition-colors" style={{borderBottom:i<arr.length-1?"1px solid #f8f5f0":"none"}} onClick={e=>{e.stopPropagation();item.action();}}>
                <span className="text-lg w-7 text-center">{item.ico}</span>
                <span className="flex-1 text-left text-sm font-bold text-gray-800">{item.label}</span>
                {item.val!==""&&(<span className="text-xs bg-orange-100 text-orange-600 font-black px-2.5 py-0.5 rounded-full">{item.val}</span>)}

          <button className="w-full py-3.5 rounded-3xl font-black text-sm text-red-500 active:scale-95 transition-all" style={{border:"1.5px solid #fecaca",background:"linear-gradient(145deg,#fff5f5,#fee2e2)"}} onClick={()=>{sUser({name:"",phone:"",isMerchant:false,shopDetails:null,isLoggedIn:false});sCart([]);sWl([]);sOrds([]);sFollows([]);sAddrs([]);sKhata([]);sLP("");sLO("");sLN("");sLS("phone");t2("Logged out!");}}>

            <div className="fixed inset-0 flex items-end justify-center" style={{zIndex:9999,background:"rgba(0,0,0,0.82)"}} onClick={()=>sVBA(false)}>

                <div className="flex justify-between items-center mb-4">
                  <div>
                    <h2 className="font-black text-lg">{"📢 Advertise with Us"}</h2>
                    <p className="text-xs text-gray-400 mt-0.5">{tl(lang,"brandPromo")}</p>

                  <div>
                    <p className="text-xs font-black text-gray-500 mb-1.5 ml-1">{"🌐 Website URL (optional)"}</p>

                  <div>
                    <p className="text-xs font-black text-gray-500 mb-1.5 ml-1">{"📂 Category"}</p>
                    <select className={C.inp} style={{background:"rgba(255,255,255,0.85)",border:"1.5px solid rgba(234,88,12,0.12)",backdropFilter:"blur(4px)"}} value={bAF.cat} onChange={e=>sBAF(f=>({...f,cat:e.target.value}))}>
                      {["Grocery","Fashion","Electronics","Home","Medicine","Beauty","Sports","Books","Dairy","Sweets","Ayurvedic","Hardware","Auto","Mobile","Shoes","Other"].map(c=>(<option key={c}>{c}</option>))}

                      <Upload size={16}/><span className="font-black text-sm">{bAF.banner?tl(lang,"bannerSelected"):tl(lang,"bannerUpload")}</span>

                    {bAF.banner&&(<div className="mt-2 rounded-2xl overflow-hidden" style={{height:"100px"}}><img src={bAF.banner} alt="preview" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>)}
                  </div>
                  <div>
                    <div className="rounded-2xl p-3 mb-3" style={{background:"linear-gradient(135deg,#fdf4ff,#ede9fe)",border:"1.5px solid rgba(139,92,246,0.2)"}}>

                      <div className="space-y-1">
                        <p className="text-[10px] text-purple-600 flex items-center gap-1">{tl(lang,"adSlot1")}</p>
                        <p className="text-[10px] text-purple-600 flex items-center gap-1">{tl(lang,"adSlot2")}</p>
                        <p className="text-[10px] text-purple-600 flex items-center gap-1">{tl(lang,"adSlot3")}</p>
                      </div>
                    </div>
                    <p className="text-xs font-black text-gray-500 mb-2 ml-1">{"💳 Plan Chunein"}</p>

                      {BRAND_PLANS.map(plan=>(
                        <button key={plan.id} className={"glass card-hover w-full rounded-2xl p-3 text-left border-2 transition-all "+(bAF.plan===plan.id?"border-purple-400":"border-white/60")} style={bAF.plan===plan.id?{background:"linear-gradient(135deg,rgba(139,92,246,0.08),rgba(167,139,250,0.05))"}:{}} onClick={()=>sBAF(f=>({...f,plan:plan.id}))}>

                              <span className="text-xl">{plan.badge}</span>
                              <div>
                                <p className="font-black text-sm text-gray-800">{plan.label+" Plan"}</p>
                                <p className="text-[9px] text-gray-400">{plan.days+" din • Rs."+Math.round(plan.price/plan.days)+"/din"}</p>
                              </div>
                            </div>
                            <p className="font-black text-lg" style={{color:plan.color}}>{"Rs."+plan.price}</p>
                          </div>
                          <p className="text-[9px] font-bold text-purple-500 ml-8">{plan.perks}</p>
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
                <button className={C.btn+" "+C.or+" w-full"} style={{background:"linear-gradient(135deg,#7c3aed,#a855f7)",boxShadow:"0 4px 20px rgba(124,58,237,0.4)"}} onClick={()=>{
                  if(!bAF.brandName.trim()||(!bAF.contact&&!bAF.website)){t2("Brand naam aur WhatsApp number ya website daalein");return;}
                  if(bAF.contact&&bAF.contact.length<10){t2("10-digit WhatsApp number daalein");return;}
                  const plan=BRAND_PLANS.find(p=>p.id===bAF.plan)||BRAND_PLANS[1];
                  sAds(a=>[{id:Date.now(),plan:plan.id,label:plan.label,price:plan.price,days:plan.days,badge:plan.badge,banner:bAF.banner,shopId:null,shopName:bAF.brandName,shopCat:bAF.cat,shopImg:"",shopLoc:bAF.loc,brandContact:bAF.contact||"",brandWebsite:bAF.website||"",isBrand:true,expiresAt:Date.now()+plan.days*24*60*60*1000},...a]);
                  wa(ADMIN,"Brand Ad Request\nBrand: "+bAF.brandName+"\nContact: +91 "+bAF.contact+"\nWebsite: "+(bAF.website||"N/A")+"\nCategory: "+bAF.cat+"\nLocation: "+bAF.loc+"\nPlan: "+plan.label+" Rs."+plan.price);
                  sBAF({brandName:"",contact:"",website:"",cat:"Grocery",loc:"",plan:"basic",banner:""});
                  sVBA(false);
                  t2(plan.badge+" Ad request bhej diya! Hum contact karenge.");
                }}>{"🌟 Ad Apply Karein — Rs."+(BRAND_PLANS.find(p=>p.id===bAF.plan)||BRAND_PLANS[1]).price}</button>
                <p className="text-center text-[10px] text-gray-400 mt-2">{tl(lang,"adPayNote")}</p>
              </div>
            </div>
          )}
        </div>
      )}

      {tab==="admin"&&(<AdminPanel onBack={()=>sTab("account")} lang={lang}/>)}

      <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto flex justify-around py-2" style={{background:"rgba(255,248,242,0.85)",backdropFilter:"blur(32px)",WebkitBackdropFilter:"blur(32px)",borderTop:"1px solid rgba(234,88,12,0.15)",boxShadow:"0 -8px 48px rgba(124,45,18,0.14), inset 0 1px 0 rgba(255,255,255,0.8)"}}>
        {[
          {id:"home",icon:Home,label:t("home")},
          {id:"deals",icon:Zap,label:t("deals")},
          {id:user.isMerchant?"merchant":"register",icon:Store,label:t("myShop")},
          {id:"cart",icon:ShoppingBag,label:"Cart"},
          {id:"account",icon:User,label:t("account")},
        ].map(item=>{
          const active=tab===item.id;
          const isCart=item.id==="cart";
          return (
            <button key={item.id} className="flex flex-col items-center gap-0.5 px-3 py-1 transition-all active:scale-90 relative" onClick={()=>{if(isCart){sVC(true);}else{sTab(item.id);}}}>
              {active && !isCart && (<div className="absolute -top-2 left-1/2 -translate-x-1/2 w-8 h-1 rounded-full" style={{background:"linear-gradient(to right,#f97316,#ea580c)"}}/>)}
              <div className="relative">
                {isCart ? (
                  <div className="relative">
                    {cart.length>0 ? (
                      <div className="relative w-10 h-10 rounded-2xl flex items-center justify-center" style={{background:"rgba(255,255,255,0.95)",boxShadow:"0 4px 14px rgba(234,88,12,0.25)",border:"1.5px solid rgba(234,88,12,0.2)"}}>
                        <ShoppingBag size={20} className="text-orange-500"/>
                        <span className="absolute -top-1.5 -right-1.5 text-white text-[9px] font-black rounded-full w-5 h-5 flex items-center justify-center" style={{background:"linear-gradient(135deg,#ea580c,#f97316)",boxShadow:"0 2px 6px rgba(234,88,12,0.4)"}}>{cart.length>9?"9+":cart.length}</span>
                      </div>
                    ) : (
                      <ShoppingBag size={22} className="text-gray-400"/>
                    )}
                  </div>
                ) : (
                  <item.icon size={22} className={active?"text-orange-600":"text-gray-400"} fill={active?"currentColor":"none"}/>
                )}
              </div>
              <span className={"text-[9px] font-black uppercase tracking-wide "+(isCart?(cart.length>0?"text-orange-600":"text-gray-400"):active?"text-orange-600":"text-gray-400")}>{item.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}


  // Mount app
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(App));
  hideSplash();
  </script>
</body>
</html>
